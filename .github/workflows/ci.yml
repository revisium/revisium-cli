name: Server CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      NODE_OPTIONS: '--max-old-space-size=4096'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint:ci

      - name: Compile TypeScript
        run: npm run tsc

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Build CLI for E2E tests
        run: npm run build

      - name: Start Revisium
        run: |
          npx @revisium/standalone --auth --port 8082 --data .e2e-test > revisium.log 2>&1 &
          echo $! > revisium.pid
          echo "Started with PID $(cat revisium.pid)"

      - name: Wait for Revisium to be ready
        run: |
          for i in $(seq 1 300); do
            if curl -sf http://localhost:8082/health/readiness > /dev/null 2>&1; then
              echo "Ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for Revisium"
          cat revisium.log
          exit 1

      - name: Run E2E tests with coverage
        run: npm run test:e2e:cov

      - name: Stop Revisium
        if: always()
        run: |
          if [ -f revisium.pid ]; then
            kill $(cat revisium.pid) 2>/dev/null || true
            rm -f revisium.pid
          fi
          rm -rf .e2e-test

      - name: Show Revisium logs on failure
        if: failure()
        run: cat revisium.log 2>/dev/null || true

      - name: Merge coverage reports
        run: npm run coverage:merge

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@8c71dc039c2dd71d3821e89a2b58ecc7fee6ced9 #SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload results to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 #codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
